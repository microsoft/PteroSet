name: birds

datasets:
  - Humboldt_Aves

class_names:
  0: "No Birds"
  1: "Birds"

paths:
  data_root: "./data"
  output_root: "./outputs"
  spectrograms_dir: "./data/spectrograms"
  annotations_file: "annotations_identification.json"

audio:
  sample_rate: 48000
  window_size_sec: 5.0
  overlap_sec: 4.0
  # Window generation strategy:
  #   - "sliding": Fixed overlap windows across entire audio (default)
  #   - "balanced": Centers windows on annotations, samples negatives
  window_strategy: "sliding"
  # For "balanced" strategy only: proportion of negatives (0.5 = 50% negatives)
  negative_proportion: 0.5

spectrogram:
  n_fft: 2048
  hop_length: 512
  n_mels: 224
  top_db: 80.0
  fill_noise: false
  noise_db_std: 3.0 # Standard deviation of noise in dB when fill_noise is true
  storage_dtype: "float32"

training:
  batch_size: 32
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 50
  backbone: "resnet18"
  num_classes: 2
  label_smoothing: 0.0
  target_size: [224, 469]
  x_col: "spec_name"
  y_col: "label"
  normalize: true
  use_specaug: false
  pos_weight: 1.0
  conf_threshold: 0.5

splits:
  test_size: 0.15
  val_size: 0.15
  n_splits: 5
  random_state: 42
